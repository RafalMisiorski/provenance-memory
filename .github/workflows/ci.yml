name: ci
on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (test extra only — the library itself is zero-dependency)
        run: pip install -e ".[test]"
      - name: Tests
        run: python -m pytest -q
      - name: Offline benchmarks (the README "Verify in 90s" claims — mem0 harness excluded, needs Ollama)
        run: |
          python bench/bench_changed_facts.py
          python bench/fuzz_oracle.py
